<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Section</title>
    <link rel="stylesheet" href="gift.css">
</head>
<body>
    <div class="gift-container">
        <div class="heading">
            <h2>Choose one of them and unlock surprising gift!</h2>
        </div>
        <div class="card-container">
            <div class="toast">
                <h3>Here is your gift</h3>
                <img src="chocolate.webp" alt="chocolate">
                <button id="msgBtn">Next</button>
            </div>
            <div class="card">Card-1</div>
            <div class="card">Card-2</div>
            <div class="card">Card-3</div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="gift.js"></script>
</body>
</html>
